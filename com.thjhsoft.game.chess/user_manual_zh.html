<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户手册</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        h1 { color: #333; }
        h2 { color: #555; }
    </style>
</head>
<body>
    <h1>用户手册</h1>
    <h2>如何玩</h2>
    <p>国际象棋是两名玩家进行的棋盘游戏。它在一个由 64 个小方格组成的正方形棋盘上进行，每边有 8 个方格。</p>
    <h2>游戏模式</h2>
    <ul>
        <li><strong>人人对战：</strong> 在同一台设备上与朋友对战。</li>
        <li><strong>人机对战：</strong> 挑战具有不同难度级别的电脑。</li>
    </ul>
    <h2>功能</h2>
    <ul>
        <li><strong>悔棋：</strong> 撤销上一步操作。</li>
        <li><strong>提示：</strong> 查看所选棋子的可能移动位置。</li>
        <li><strong>记录：</strong> 保存并重放您的对局。</li>
    </ul>
</body>
</html>
