<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户手册 - Drizzle</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; color: #333; }
        h1 { color: #2c3e50; }
        h2 { color: #34495e; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .footer { margin-top: 30px; font-size: 0.8em; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 10px; }

<body>
    <h1>用户手册</h1>
    <p>欢迎使用 Drizzle，您的个人放松与专注伴侣。</p>

    <h2>1. 创建您的场景</h2>
    <p>点击“+”按钮开始创建独特的声音景观。将环境音轨（如森林或雨声）与各种图层（如雷声或风声）结合起来。</p>

    <h2>2. 调节音量</h2>
    <p>使用滑块为每个图层找到完美的平衡。您还可以控制整个场景的总音量。</p>

    <h2>3. 设置定时器</h2>
    <p>准备入睡？设置睡眠定时器，在一段时间后自动停止播放。</p>

    <h2>4. AdMob 广告说明</h2>
    <p>为了让 Drizzle 对所有人免费，我们使用 Google AdMob 展示少量广告。这些广告有助于支持应用程序的开发和维护。</p>
